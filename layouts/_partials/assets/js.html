{{- with resources.Get "js/jquery-4.0.0.slim.min.js" }}
  <script src="{{ .RelPermalink }}"></script>
{{- end }}

{{- with resources.Get "js/comb/comb.js" }}
  <script src="{{ .RelPermalink }}"></script>
{{- end }}

{{- with resources.Get "js/main.js" }}
  {{- $opts := dict
    "minify" (cond hugo.IsDevelopment false true)
  }}
  {{- with . | js.Build $opts }}
    <script src="{{ .RelPermalink }}"></script>
  {{- end }}
{{- end }}
